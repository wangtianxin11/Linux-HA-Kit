! Configuration File for keepalived

global_defs {
   notification_email {
     support@h-visions.com
   }
   notification_email_from support@h-visions.com
   smtp_server localhost
   smtp_connect_timeout 30
   script_user root
   enable_script_security
}

vrrp_script chk_mysql {
    script "/etc/keepalived/check_mysql.sh"
    interval 2          # 每2秒检查一次
    weight -30          # 如果脚本失败，priority 减 30（100-30=70 < 90，备机接管）
    fall 2              # 连续2次失败才认为异常
    rise 2              # 连续2次成功才恢复
}

vrrp_instance VI_1 {
    state MASTER
    interface eno3np2
    virtual_router_id 101
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass 1111
    }
    virtual_ipaddress {
        10.111.103.8/24
    }
    track_script {
        chk_mysql
    }
    notify_master "/etc/keepalived/notify_redis_master.sh"
    notify_backup "/etc/keepalived/notify_redis_backup.sh"
}