# MongoDB 副本集配置模板（热备模式）
# 由安装脚本通过 sed 替换占位符后写入 /etc/mongod.conf
# security.keyFile 隐式启用 authorization，无需重复声明

storage:
  dbPath: /var/lib/mongodb

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

net:
  port: __MONGO_PORT__
  bindIp: 0.0.0.0

processManagement:
  timeZoneInfo: /usr/share/zoneinfo

security:
  keyFile: /etc/mongodb/keyfile

replication:
  replSetName: __MONGO_REPLSET__
